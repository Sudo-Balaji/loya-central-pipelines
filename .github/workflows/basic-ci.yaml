name: Central Basic CI

on:
  workflow_call:
    # 1. WE DECLARE THE INPUTS HERE
    inputs:
      app_name:
        description: "The name of the application being built"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: say hellow 
        run: echo "hellow from Central repo !! -- resuable workflow executed succesfully"
     
      # 2. WE USE THE INPUT HERE
      - name: Print the Passed Variable
        run: echo "The Caller repo told me to build the application named -> ${{ inputs.app_name }}"
